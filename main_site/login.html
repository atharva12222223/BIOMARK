<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biomark — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--y:#FFD700;--dk:#2b3a4a;--dk2:#1a253a;--gr:#cfd8dc}
body{font-family:'Poppins',sans-serif;background:var(--dk2);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
a{color:inherit;text-decoration:none}

.back{position:fixed;top:20px;left:24px;color:#fff;font-weight:600;font-size:.9rem;opacity:.7;transition:opacity .2s}
.back:hover{opacity:1}
.brand{color:var(--y);font-size:1.5rem;font-weight:800;letter-spacing:3px;margin-bottom:32px;text-align:center}

/* TAB switcher */
.tabs{display:flex;background:rgba(255,255,255,.07);border-radius:30px;padding:4px;margin-bottom:28px;width:280px}
.tab{flex:1;text-align:center;padding:10px;border-radius:26px;font-weight:700;font-size:.9rem;cursor:pointer;color:rgba(255,255,255,.5);transition:all .25s}
.tab.active{background:var(--y);color:var(--dk2)}

/* FORM BOX */
.box{background:#1e2d40;border-radius:18px;padding:36px 32px;width:400px;max-width:95vw;border:1px solid rgba(255,255,255,.07);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.panel{display:none}
.panel.active{display:block}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.field label{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px}
.field .inp-wrap{position:relative}
.field .inp-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:.9rem}
.field input{width:100%;padding:11px 14px 11px 38px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-family:'Poppins',sans-serif;font-size:.9rem;outline:none;transition:border .2s}
.field input:focus{border-color:var(--y)}
.field input::placeholder{color:rgba(255,255,255,.25)}

.err{color:#e74c3c;font-size:.82rem;font-weight:600;margin-bottom:12px;min-height:18px}
.btn-login{width:100%;padding:13px;background:var(--y);color:var(--dk2);font-family:'Poppins',sans-serif;font-weight:800;font-size:1rem;border:none;border-radius:12px;cursor:pointer;transition:opacity .2s,transform .15s}
.btn-login:hover{opacity:.88;transform:scale(1.01)}
.btn-login:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ─── QR / Password toggle ─── */
.login-divider{display:flex;align-items:center;gap:12px;margin:20px 0 16px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.12)}
.login-divider span{color:rgba(255,255,255,.35);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}

.btn-qr-toggle{width:100%;padding:13px;background:transparent;color:var(--y);font-family:'Poppins',sans-serif;font-weight:700;font-size:.92rem;border:2px solid var(--y);border-radius:12px;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-qr-toggle:hover{background:rgba(255,215,0,.1)}
.btn-qr-toggle i{font-size:1.1rem}

/* ─── QR Scanner area ─── */
.qr-scanner-area{display:none;animation:fadeSlide .3s ease}
.qr-scanner-area.active{display:block}
.password-area{animation:fadeSlide .3s ease}

@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

#qr-reader{width:100%;border-radius:12px;overflow:hidden;margin-bottom:14px;border:2px solid rgba(255,215,0,.25)}
#qr-reader video{border-radius:10px}
/* Override html5-qrcode internal styles */
#qr-reader__scan_region{min-height:220px}
#qr-reader__dashboard{padding:8px !important}
#qr-reader__dashboard_section{padding:4px !important}
#qr-reader__dashboard_section_csr button{
  background:var(--y) !important;color:var(--dk2) !important;
  border:none !important;border-radius:8px !important;padding:8px 16px !important;
  font-family:'Poppins',sans-serif !important;font-weight:700 !important;font-size:.82rem !important;
  cursor:pointer !important
}
#qr-reader__dashboard select{
  background:#1e2d40 !important;color:#fff !important;
  border:1px solid rgba(255,255,255,.2) !important;border-radius:6px !important;
  padding:4px 8px !important;font-family:'Poppins',sans-serif !important;font-size:.82rem !important
}
#qr-reader__status_span{color:rgba(255,255,255,.5) !important;font-size:.78rem !important}
#qr-reader img[alt="Info icon"]{display:none !important}
#qr-reader__header_message{display:none !important}

.qr-status{text-align:center;padding:10px;font-size:.85rem;font-weight:600;border-radius:10px;margin-bottom:12px;min-height:18px;transition:all .3s}
.qr-status.scanning{color:rgba(255,255,255,.5)}
.qr-status.success{color:#2ecc71;background:rgba(46,204,113,.1)}
.qr-status.error{color:#e74c3c;background:rgba(231,76,60,.1)}

.scan-hint{text-align:center;color:rgba(255,255,255,.35);font-size:.78rem;margin-bottom:14px;line-height:1.5}
</style>
</head>
<body>

<a href="/" class="back"><i class="fa-solid fa-arrow-left"></i> Back</a>

<div class="brand">BIOMARK</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('student')"><i class="fa-solid fa-graduation-cap"></i> Student</div>
  <div class="tab"        onclick="switchTab('teacher')"><i class="fa-solid fa-chalkboard-user"></i> Teacher</div>
</div>

<div class="box">

  <!-- STUDENT -->
  <div class="panel active" id="panel-student">

    <!-- Password login form -->
    <div class="password-area" id="passwordArea">
      <div class="field">
        <label>Register Number</label>
        <div class="inp-wrap"><i class="fa-solid fa-id-card"></i>
          <input type="text" id="s-regno" placeholder="e.g. 457CS23063">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="inp-wrap"><i class="fa-solid fa-lock"></i>
          <input type="password" id="s-pass" placeholder="Your password">
        </div>
      </div>
      <div class="err" id="s-err"></div>
      <button class="btn-login" id="s-btn" onclick="loginStudent()">
        <i class="fa-solid fa-right-to-bracket"></i> Login as Student
      </button>

      <div class="login-divider"><span>or</span></div>

      <button class="btn-qr-toggle" onclick="showQRScanner()">
        <i class="fa-solid fa-qrcode"></i> Scan QR Code to Login
      </button>
    </div>

    <!-- QR Scanner area -->
    <div class="qr-scanner-area" id="qrScannerArea">
      <div class="scan-hint">
        <i class="fa-solid fa-camera" style="font-size:1.1rem;color:var(--y);display:block;margin-bottom:6px"></i>
        Point your camera at your student QR code
      </div>
      <div id="qr-reader"></div>
      <div class="qr-status" id="qrStatus"></div>

      <div class="login-divider"><span>or</span></div>

      <button class="btn-qr-toggle" onclick="showPasswordLogin()">
        <i class="fa-solid fa-keyboard"></i> Login with Roll No &amp; Password
      </button>
    </div>

  </div>

  <!-- TEACHER -->
  <div class="panel" id="panel-teacher">
    <div class="field">
      <label>Username</label>
      <div class="inp-wrap"><i class="fa-solid fa-user"></i>
        <input type="text" id="t-user" placeholder="e.g. sonali">
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="inp-wrap"><i class="fa-solid fa-lock"></i>
        <input type="password" id="t-pass" placeholder="Your password">
      </div>
    </div>
    <div class="err" id="t-err"></div>
    <button class="btn-login" id="t-btn" onclick="loginTeacher()">
      <i class="fa-solid fa-right-to-bracket"></i> Login as Teacher
    </button>
  </div>

</div>

<script>
/* ─── Tab switching ─── */
function switchTab(role) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.closest('.tab').classList.add('active');
  document.getElementById('panel-'+role).classList.add('active');
  // Stop QR scanner if switching away from student tab
  if (role !== 'student') stopQRScanner();
}

/* ─── POST helper ─── */
async function post(url, body) {
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || 'Login failed');
  return d;
}

/* ─── Password login ─── */
async function loginStudent() {
  const regno = document.getElementById('s-regno').value.trim();
  const pass  = document.getElementById('s-pass').value;
  const err   = document.getElementById('s-err');
  const btn   = document.getElementById('s-btn');
  err.textContent = '';
  if (!regno || !pass) { err.textContent = 'Please fill in all fields.'; return; }
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const d = await post('/api/auth/student', {regno, password:pass});
    localStorage.setItem('bm_token', d.token);
    localStorage.setItem('bm_role',  d.role);
    localStorage.setItem('bm_name',  d.name);
    window.location.href = '/student';
  } catch(e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login as Student';
  }
}

async function loginTeacher() {
  const username = document.getElementById('t-user').value.trim();
  const pass     = document.getElementById('t-pass').value;
  const err      = document.getElementById('t-err');
  const btn      = document.getElementById('t-btn');
  err.textContent = '';
  if (!username || !pass) { err.textContent = 'Please fill in all fields.'; return; }
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const d = await post('/api/auth/teacher', {username, password:pass});
    localStorage.setItem('bm_token', d.token);
    localStorage.setItem('bm_role',  d.role);
    localStorage.setItem('bm_name',  d.name);
    localStorage.setItem('bm_is_admin', d.is_admin);
    window.location.href = '/teacher';
  } catch(e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login as Teacher';
  }
}

/* ─── QR Scanner ─── */
let html5QrCode = null;
let qrScanning  = false;

function showQRScanner() {
  document.getElementById('passwordArea').style.display = 'none';
  const area = document.getElementById('qrScannerArea');
  area.classList.add('active');
  startQRScanner();
}

function showPasswordLogin() {
  stopQRScanner();
  document.getElementById('qrScannerArea').classList.remove('active');
  document.getElementById('passwordArea').style.display = 'block';
}

function startQRScanner() {
  if (qrScanning) return;
  const statusEl = document.getElementById('qrStatus');
  statusEl.className = 'qr-status scanning';
  statusEl.textContent = 'Starting camera...';

  html5QrCode = new Html5Qrcode("qr-reader");

  html5QrCode.start(
    { facingMode: "environment" },   // back camera preferred
    { fps: 10, qrbox: { width: 220, height: 220 } },
    onQRScanSuccess,
    () => {}   // ignore scan failures (normal during scanning)
  ).then(() => {
    qrScanning = true;
    statusEl.className = 'qr-status scanning';
    statusEl.textContent = 'Scanning... show your QR code';
  }).catch(err => {
    statusEl.className = 'qr-status error';
    statusEl.textContent = 'Camera access denied or unavailable';
    console.error('QR start error:', err);
  });
}

function stopQRScanner() {
  if (html5QrCode && qrScanning) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      qrScanning = false;
    }).catch(() => { qrScanning = false; });
  }
}

async function onQRScanSuccess(decodedText) {
  // Prevent multiple triggers
  if (!qrScanning) return;
  stopQRScanner();

  const statusEl = document.getElementById('qrStatus');
  statusEl.className = 'qr-status scanning';
  statusEl.textContent = '✨ QR detected! Logging in...';

  try {
    const d = await post('/api/auth/student-qr', { token: decodedText });
    statusEl.className = 'qr-status success';
    statusEl.textContent = `✅ Welcome, ${d.name}!`;
    localStorage.setItem('bm_token', d.token);
    localStorage.setItem('bm_role',  d.role);
    localStorage.setItem('bm_name',  d.name);
    setTimeout(() => { window.location.href = '/student'; }, 800);
  } catch(e) {
    statusEl.className = 'qr-status error';
    statusEl.textContent = '❌ ' + (e.message || 'Invalid QR code');
    // Allow re-scanning after a short delay
    setTimeout(() => {
      statusEl.className = 'qr-status scanning';
      statusEl.textContent = 'Try again...';
      startQRScanner();
    }, 2500);
  }
}

/* ─── Enter key support ─── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-student').classList.contains('active') &&
      document.getElementById('passwordArea').style.display !== 'none') {
    loginStudent();
  } else if (document.getElementById('panel-teacher').classList.contains('active')) {
    loginTeacher();
  }
});
</script>
</body>
</html>
